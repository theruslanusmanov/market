services:
  # Backend service
  products-service:
    container_name: products-service
    build:
      context: ./products-service
    ports:
      - "8001:8001"
    network_mode: host

  # Frontend app
  pizza-app:
    container_name: pizza-app
    build:
      context: ./pizza-app
    ports:
      - "5173:5173"